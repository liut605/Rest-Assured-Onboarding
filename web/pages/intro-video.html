<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Intro video</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <script defer src="../app.js"></script>
    <script defer src="../interactions.js"></script>
  </head>
  <body>
    <div class="viewport">
      <main
        class="stage intro-video-stage"
        data-node-id="intro-video"
        data-advance="none"
        data-neopixel='{"state":"off"}'
      >
        <style>
          .intro-video-stage {
            width: 100vw !important;
            height: 100vh !important;
            transform: none !important;
            background: #000;
          }

          .video-frame {
            position: absolute;
            inset: 0;
            background: #000;
            overflow: hidden;
          }

          .video-frame video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
          }

          .video-progress {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 24px;
            z-index: 3;
            cursor: pointer;
          }

          .video-progress-track {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.35);
            overflow: hidden;
          }

          .video-progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: #fff;
          }

          .intro-restart {
            position: absolute;
            left: 100px;
            top: calc(100% - 164px);
            width: 375px;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 220ms ease;
          }

          .intro-next {
            position: absolute;
            left: calc(100% - 475px);
            top: calc(100% - 164px);
            width: 375px;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 220ms ease;
          }

          .intro-restart.is-visible,
          .intro-next.is-visible {
            opacity: 1;
            pointer-events: auto;
          }
        </style>

        <section class="video-frame">
          <video
            id="intro-video"
            playsinline
            preload="auto"
            autoplay
            src="../assets/intro.pm4"
          ></video>

          <div
            id="video-progress"
            class="video-progress"
            aria-label="Video progress"
          >
            <div class="video-progress-track">
              <div id="video-progress-fill" class="video-progress-fill"></div>
            </div>
          </div>

          <button
            id="intro-restart"
            class="btn btn-outline intro-restart"
            type="button"
          >
            Restart
          </button>

          <a
            id="intro-next"
            class="btn btn-outline intro-next"
            href="./905-1216.html"
          >
            Next
          </a>
        </section>

        <script>
          (() => {
            const video = document.getElementById("intro-video");
            const progress = document.getElementById("video-progress");
            const fill = document.getElementById("video-progress-fill");
            const restartBtn = document.getElementById("intro-restart");
            const nextBtn = document.getElementById("intro-next");

            if (!video || !progress || !fill || !restartBtn || !nextBtn) return;

            let hasCompletedOnce = false;
            let isPointerDown = false;

            video.volume = 1;
            video.muted = false;

            // Fallback to .mp4 if .pm4 is unavailable.
            video.addEventListener("error", () => {
              if (video.src.endsWith("/intro.pm4")) {
                video.src = "../assets/intro.mp4";
                video.load();
                tryStartPlayback();
              }
            });

            function setProgress(pct) {
              const clamped = Math.min(100, Math.max(0, pct));
              fill.style.width = `${clamped}%`;
            }

            function seekFromClientX(clientX) {
              const rect = progress.getBoundingClientRect();
              if (
                rect.width <= 0 ||
                !Number.isFinite(video.duration) ||
                video.duration <= 0
              )
                return;
              const ratio = Math.min(
                1,
                Math.max(0, (clientX - rect.left) / rect.width),
              );
              video.currentTime = ratio * video.duration;
              setProgress(ratio * 100);
            }

            function handleSeekEvent(e) {
              if (typeof e.clientX !== "number") return;
              seekFromClientX(e.clientX);
            }

            function tryStartPlayback() {
              video.play().catch(() => {});
            }

            video.addEventListener("timeupdate", () => {
              if (
                !isPointerDown &&
                Number.isFinite(video.duration) &&
                video.duration > 0
              ) {
                setProgress((video.currentTime / video.duration) * 100);
              }
            });

            video.addEventListener("ended", () => {
              if (!hasCompletedOnce) {
                hasCompletedOnce = true;
                restartBtn.classList.add("is-visible");
                nextBtn.classList.add("is-visible");
              }
            });

            video.addEventListener("loadedmetadata", () => {
              setProgress(0);
            });

            progress.addEventListener("click", handleSeekEvent);

            progress.addEventListener("pointerdown", (e) => {
              e.preventDefault();
              isPointerDown = true;
              progress.setPointerCapture?.(e.pointerId);
              handleSeekEvent(e);
            });

            progress.addEventListener("pointermove", (e) => {
              if (!isPointerDown) return;
              handleSeekEvent(e);
            });

            function stopSeek() {
              isPointerDown = false;
            }
            progress.addEventListener("pointerup", stopSeek);
            progress.addEventListener("pointercancel", stopSeek);
            progress.addEventListener("pointerleave", stopSeek);

            restartBtn.addEventListener("click", () => {
              video.currentTime = 0;
              setProgress(0);
              tryStartPlayback();
            });

            tryStartPlayback();
          })();
        </script>
      </main>
    </div>
  </body>
</html>
