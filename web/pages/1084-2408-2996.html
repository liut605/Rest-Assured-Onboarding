        <style>

          }

          .login-btn {

          .login-signin-row {

            display: flex;

          .right-copy p {

          .login-shell.is-exiting .login-left {

          /* During half->full transition, force video to overfill viewport. */

            object-fit: cover !important;

        <section class="login-shell">

            <div class="scene scene-petname">
              <div class="login-headshot">
                <img
                  class="img img-contain"
                  alt="Crimson headshot"
                  src="../assets/crimson-headshot.png"
                />
              </div>
              <p class="login-prompt">Woof! Then, what is MY name?</p>
              <input class="login-input" value="Crimson" />

          <div class="login-right">

                muted

              <video

        <script>
          (() => {
            const root = document.querySelector(".login-left");
            const shell = document.querySelector(".login-shell");
            const rightPane = document.querySelector(".login-right");
            const nextBtn = document.querySelector("[data-login-next]");
            const finishBtn = document.querySelector("[data-login-finish]");
            const usernameStep = root?.querySelector('[data-step="username"]');
            const petnameStep = root?.querySelector('[data-step="petname"]');
            let isExiting = false;
            let isTransitionQueued = false;
            const EXPAND_MS = 520;
            const TEXT_LINGER_MS = 2000;

            function renderStepState(scene) {
              if (scene === "petname") {
                if (usernameStep) {
                  usernameStep.classList.remove("is-current");
                  usernameStep.classList.add("is-past");
                  const icon = usernameStep.querySelector(".icon");
                  if (icon) icon.className = "icon icon--past";
                }
                if (petnameStep) {
                  petnameStep.classList.remove("is-future");
                  petnameStep.classList.add("is-current");
                  const icon = petnameStep.querySelector(".icon");
                  if (icon) icon.className = "icon icon--current";
                }
                return;
              }

              if (usernameStep) {
                usernameStep.classList.remove("is-past");
                usernameStep.classList.add("is-current");
                const icon = usernameStep.querySelector(".icon");
                if (icon) icon.className = "icon icon--current";
              }
              if (petnameStep) {
                petnameStep.classList.remove("is-current");
                petnameStep.classList.add("is-future");
                const icon = petnameStep.querySelector(".icon");
                if (icon) icon.className = "icon icon--future";
              }
            }

            function setScene(scene) {
              if (!root) return;
              root.setAttribute("data-scene", scene);
              renderStepState(scene);
            }

            if (root && nextBtn) {
              nextBtn.addEventListener("click", (e) => {
                e.preventDefault();
                setScene("petname");
              });
            }

            if (usernameStep) {
              usernameStep.addEventListener("click", () => {
                if (!root) return;
                if (root.getAttribute("data-scene") !== "petname") return;
                setScene("username");
              });
            }

            function animateToIntro(href) {
              if (isExiting) return;
              isExiting = true;

              if (!rightPane) {
                window.location.href = href;
                return;
              }

              shell?.classList.add("is-exiting");
              rightPane.classList.add("is-expanding");

              const rect = rightPane.getBoundingClientRect();
              const placeholder = document.createElement("div");
              placeholder.style.width = `${rect.width}px`;
              placeholder.style.height = `${rect.height}px`;
              placeholder.style.pointerEvents = "none";
              rightPane.parentNode?.insertBefore(placeholder, rightPane);

              Object.assign(rightPane.style, {
                position: "fixed",
                left: `${rect.left}px`,
                top: `${rect.top}px`,
                width: `${rect.width}px`,
                height: `${rect.height}px`,
                margin: "0",
                zIndex: "9999",
                pointerEvents: "none",
              });

              window.requestAnimationFrame(() => {
                rightPane.style.transition = `left ${EXPAND_MS}ms cubic-bezier(0.22, 0.61, 0.36, 1), width ${EXPAND_MS}ms cubic-bezier(0.22, 0.61, 0.36, 1)`;
                rightPane.style.left = "0px";
                rightPane.style.width = `${window.innerWidth}px`;
              });

              window.setTimeout(() => {
                window.location.href = href;
              }, EXPAND_MS + TEXT_LINGER_MS);
            }

            if (finishBtn) {
              finishBtn.addEventListener("click", (e) => {
                e.preventDefault();
                if (isTransitionQueued || isExiting) return;
                isTransitionQueued = true;
                finishBtn.style.pointerEvents = "none";
                const href =
                  finishBtn.getAttribute("href") || "./intro-video.html";
                animateToIntro(href);
              });
            }
          })();
        </script>

        <script>
          (() => {
            const clips = Array.from(document.querySelectorAll(".video-half"));
            if (!clips.length) return;

            const CROSSFADE_MS = 280;
            let current = 0;
            let timer = null;

            async function ensureReady(video) {
              if (video.readyState >= 1 && Number.isFinite(video.duration))
                return;
              await Promise.race([
                new Promise((resolve) => {
                  video.addEventListener("loadedmetadata", resolve, {
                    once: true,
                  });
                }),
                new Promise((resolve) => {
                  window.setTimeout(resolve, 1200);
                }),
              ]);
            }

            function clearTimer() {
              if (timer != null) {
                window.clearTimeout(timer);
                timer = null;
              }
            }

            function activate(index) {
              clips.forEach((v, i) => {
                v.classList.toggle("is-active", i === index);
                if (i !== index) {
                  try {
                    v.pause();
                  } catch {
                    // ignore pause errors
                  }
                }
              });
            }

            async function playAt(index) {
              current = index;
              const clip = clips[current];
              await ensureReady(clip);
              activate(current);
              try {
                clip.currentTime = 0;
              } catch {
                // ignore currentTime set errors on some streams
              }
              clip.play().catch(() => {});

              const durationMs = Math.max(
                400,
                Math.round((clip.duration || 0.4) * 1000),
              );
              const holdMs = Math.max(80, durationMs - CROSSFADE_MS);

              clearTimer();
              timer = window.setTimeout(() => {
                const next = (current + 1) % clips.length;
                const nextClip = clips[next];
                ensureReady(nextClip).then(() => {
                  try {
                    nextClip.currentTime = 0;
                  } catch {
                    // ignore currentTime set errors on some streams
                  }
                  nextClip.play().catch(() => {});
                  playAt(next);
                });
              }, holdMs);
            }

            clips.forEach((clip) => {
              clip.muted = true;
              clip.playsInline = true;
            });

            ensureReady(clips[0]).then(() => {
              playAt(0);
            });

            function nudgePlayback() {
              const active = clips[current];
              if (!active) return;
              if (active.paused) {
                active.play().catch(() => {});
              }
              if (timer == null) {
                playAt(current);
              }
            }

            document.addEventListener("visibilitychange", () => {
              if (!document.hidden) nudgePlayback();
            });
            window.addEventListener("focus", nudgePlayback);
            window.addEventListener("pageshow", nudgePlayback);

            window.addEventListener("pagehide", () => {
              clearTimer();
              clips.forEach((v) => {
                try {
                  v.pause();
                } catch {
                  // ignore
                }
              });
            });
          })();
        </script>
      </main>
    </div>
  </body>
