<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>795:889 — Lamp 1 (Blanket)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <script defer src="../app.js"></script>
    <script defer src="../interactions.js"></script>
  </head>
  <body>
    <div class="viewport">
      <main class="stage bg-beige" data-node-id="795:889" data-advance="none">
        <h1
          class="playfair"
          style="
            position: absolute;
            left: 326px;
            top: 150px;
            margin: 0;
            font-size: 48px;
            line-height: 1.25;
            color: #000;
            white-space: nowrap;
          "
        >
          Remember how I LOVE to snuggle inside your blanket?
        </h1>

        <div
          id="bed-layer"
          style="
            position: absolute;
            left: 0;
            top: 663px;
            width: 100%;
            transition: opacity 1000ms ease;
          "
        >
          <img class="img-fit-width" alt="Bed" src="../assets/bed.png" />
        </div>

        <div
          id="blanket-layer"
          style="
            position: absolute;
            left: -10%;
            top: 362px;
            width: 120%;
            transition: opacity 2000ms ease;
          "
          aria-hidden="true"
        >
          <img
            class="img-fit-width"
            alt="blanket"
            src="../assets/blanket.png"
          />
        </div>

        <!-- "Smart animation" frames combined: figurine pops in, then CTA appears -->
        <div
          id="nose-layer"
          class="reveal"
          data-reveal="dog"
          data-delay-ms="500"
          style="
            position: absolute;
            left: -10%;
            top: 362px;
            width: 120%;
            height: auto;
            transition: opacity 1000ms ease;
          "
        >
          <img
            class="img-fit-width"
            alt="Dog nose"
            src="../assets/nose-under-blanket.png"
          />
        </div>

        <div
          id="figurine-layer"
          style="
            position: absolute;
            left: 204px;
            top: 333px;
            width: 1059px;
            height: 660.491px;
            opacity: 0;
            transition: opacity 1000ms ease;
          "
        >
          <img
            class="img img-contain"
            alt="Abstract figurine"
            src="../assets/figurine.png"
          />
        </div>

        <section
          id="progress-scene"
          style="
            position: absolute;
            inset: 0;
            background: #c4cecb;
            opacity: 0;
            pointer-events: none;
            transition: opacity 900ms ease;
          "
          aria-hidden="true"
        >
          <div class="table" aria-hidden="true"></div>
          <div style="position: absolute; left: 317px; top: 266px; width: 1059px; height: 660.491px">
            <img class="img img-contain" alt="Figurine" src="../assets/figurine.png" />
          </div>

          <a
            class="btn btn-outline"
            href="./868-977.html"
            style="position: absolute; left: 1253px; top: 953px; width: 375px; z-index: 3"
            >Next</a
          >
        </section>
        <script>
          (() => {
            const blanket = document.getElementById("blanket-layer");
            const bed = document.getElementById("bed-layer");
            const nose = document.getElementById("nose-layer");
            const figurine = document.getElementById("figurine-layer");
            const progressScene = document.getElementById("progress-scene");
            if (!blanket || !bed || !nose || !figurine || !progressScene) return;

            // After nose-under-blanket is fully revealed, remove blanket layer.
            window.setTimeout(() => {
              blanket.classList.add("u-hidden");
            }, 500);

            // After blanket dissolve finishes, fade nose out and figurine in.
            window.setTimeout(() => {
              nose.classList.add("u-hidden");
              figurine.style.opacity = "1";
              bed.classList.add("u-hidden");
            }, 2000);

            // Start transitioning into the additional frame while bed is fading out.
            window.setTimeout(() => {
              progressScene.style.opacity = "1";
              progressScene.style.pointerEvents = "auto";
              progressScene.setAttribute("aria-hidden", "false");
            }, 2000);
          })();
        </script>
      </main>
    </div>
  </body>
</html>
