        <script>
          (() => {
            const flow = document.getElementById("reminder-flow");
            const nextBtn = document.getElementById("reminder-next");
            const backBtn = document.getElementById("reminder-back");
            if (!flow || !nextBtn || !backBtn) return;

            const sceneOrder = ["a", "b", "c"];
            const getScene = () => flow.getAttribute("data-scene") || "a";
            const setScene = (scene) => flow.setAttribute("data-scene", scene);
            const audioFile = "Carmel Quartet - Air on the G String copy.mp3";
            const nodeId =
              document.querySelector(".stage")?.getAttribute("data-node-id") ||
              undefined;
            let ws = null;

            function ensureWs() {
              if (
                ws &&
                (ws.readyState === WebSocket.OPEN ||
                  ws.readyState === WebSocket.CONNECTING)
              ) {
                return ws;
              }
              try {
                ws = new WebSocket("ws://localhost:8787");
              } catch {
                ws = null;
              }
              return ws;
            }

            function sendBridge(payload) {
              const sock = ensureWs();
              if (!sock) return;
              const msg = JSON.stringify(payload);
              if (sock.readyState === WebSocket.OPEN) {
                sock.send(msg);
                return;
              }
              sock.addEventListener(
                "open",
                () => {
                  sock.send(msg);
                },
                { once: true },
              );
            }

            function sendNeopixelState(state) {
              if (!state) return;
              sendBridge({
                type: "neopixel:set",
                state,
                nodeId,
              });
            }

            function playFrame2Audio() {
              sendBridge({ type: "audio:play", file: audioFile });
            }

            function stopFrame2Audio() {
              sendBridge({ type: "audio:stop" });
            }

            function applyScene(nextScene) {
              const prevScene = getScene();
              if (prevScene === "b" && nextScene !== "b") {
                stopFrame2Audio();
              } else if (prevScene !== "b" && nextScene === "b") {
                playFrame2Audio();
              }
              setScene(nextScene);
            }

            nextBtn.addEventListener("click", (e) => {
              const current = getScene();
              const idx = sceneOrder.indexOf(current);
              if (idx >= 0 && idx < sceneOrder.length - 1) {
                e.preventDefault();
                const nextScene = sceneOrder[idx + 1];
                // First Next: orange/speaker mode. Second Next: purple/diffuser mode.
                if (current === "a" && nextScene === "b") {
                  sendNeopixelState("speaker_on");
                } else if (current === "b" && nextScene === "c") {
                  sendNeopixelState("diffuser_on");
                }
                applyScene(nextScene);
              }
            });

            backBtn.addEventListener("click", (e) => {
              const current = getScene();
              const idx = sceneOrder.indexOf(current);
              if (idx > 0) {
                e.preventDefault();
                applyScene(sceneOrder[idx - 1]);
              }
            });

            window.addEventListener("pagehide", () => {
              if (getScene() === "b") stopFrame2Audio();
            });
            window.addEventListener("beforeunload", () => {
              if (getScene() === "b") stopFrame2Audio();
            });
          })();
        </script>
