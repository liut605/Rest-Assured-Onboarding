          .quiz-art-correct {
            opacity: 0;
            pointer-events: none;
            transition: opacity 280ms ease;
          }
          .quiz-next {
            opacity: 0;
            pointer-events: none;
            transition: opacity 220ms ease;
          }
          .quiz-c-good {
            display: none;
          }
          .stage[data-quiz-state="correct"] .quiz-next {
            opacity: 1;
            pointer-events: auto;
          }
          .stage[data-quiz-state="correct"] .quiz-c-good {
            display: block;
          }
          .stage[data-quiz-state="correct"] .quiz-art-correct {
            opacity: 1;
          }
          .stage[data-quiz-state="correct"] #quiz-title .quiz-title-default {
            display: none;
          }
          .stage[data-quiz-state="correct"] #quiz-title .quiz-title-correct {
            display: inline;
          }
          .stage[data-quiz-state="incorrect"] #quiz-title .quiz-title-default {
            display: none;
          }
          .stage[data-quiz-state="incorrect"]
            #quiz-title

          }

          .quiz-title-incorrect {

          <img

        >
          <button

              border: 1px solid #000;
              border-radius: 20px;

            "
          >
            <span
              style="

                font-family: &quot;Playfair Display&quot;, serif;

              "

            >
            <img

          <button

            <img

          <button

            <div

              style="

        <a

            left: 1253px;
            top: 953px;
            width: 375px;
            z-index: 3;
          "
          >Next</a
        >

        <script>
          (() => {
            const cards = Array.from(document.querySelectorAll(".quiz-card"));
            const stage = document.querySelector(".stage");
            if (!cards.length || !stage) return;

            cards.forEach((card) => {
              card.addEventListener("click", () => {
                const choice = card.getAttribute("data-choice") || "?";
                cards.forEach((c) => (c.style.outline = "none"));
                card.style.outlineOffset = "2px";
                if (choice === "C") {
                  stage.setAttribute("data-quiz-state", "correct");
                  card.style.outline = "4px solid rgba(31, 118, 127, 0.65)";
                } else {
                  stage.setAttribute("data-quiz-state", "incorrect");
                  card.style.outline = "4px solid rgba(196, 38, 38, 0.8)";
                }
              });
            });
          })();
        </script>
