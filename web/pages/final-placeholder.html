<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Final scene placeholder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <script defer src="../app.js"></script>
    <script defer src="../interactions.js"></script>
  </head>
  <body>
    <div class="viewport">
      <main
        class="stage"
        data-node-id="final-placeholder"
        data-advance="none"
        data-neopixel='{"state":"off"}'
        style="background: #c4cecb"
      >
        <style>
          .final-scenes {
            position: absolute;
            inset: 0;
          }
          .final-backdrop {
            position: absolute;
            inset: 0;
            transition: background-color 130ms cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: background-color;
            backface-visibility: hidden;
            transform: translateZ(0);
          }
          .final-table-bg {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 454px;
            transition: background-color 130ms cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: background-color;
          }
          .final-copy {
            position: absolute;
            left: 0;
            top: 150px;
            width: 1728px;
            margin: 0;
            font-size: 48px;
            line-height: 1.2;
            text-align: center;
            color: #000;
          }
          .final-figurine {
            position: absolute;
            left: 484px;
            top: 426px;
            width: 759.173px;
            height: 473.491px;
          }
        </style>

        <nav class="progress" aria-label="Progress">
          <div class="rail" aria-hidden="true"></div>
          <div class="steps">
            <a
              class="step step-link"
              href="./intro-video.html"
              title="Introduction"
            >
              <div class="icon icon--past" aria-hidden="true"></div>
              <div class="label">Introduction</div>
            </a>
            <a class="step step-link" href="./795-889.html" title="Inspiration">
              <div class="icon icon--past" aria-hidden="true"></div>
              <div class="label">Inspiration</div>
            </a>
            <a class="step step-link" href="./795-1026.html" title="Ecosystem">
              <div class="icon icon--past" aria-hidden="true"></div>
              <div class="label">Ecosystem</div>
            </a>
            <a class="step step-link" href="./905-1679.html" title="Speaker">
              <div class="icon icon--past" aria-hidden="true"></div>
              <div class="label">Speaker</div>
            </a>
            <a class="step step-link" href="./809-2598.html" title="Diffuser">
              <div class="icon icon--past" aria-hidden="true"></div>
              <div class="label">Diffuser</div>
            </a>
            <a class="step step-link" href="./913-2849.html" title="Quiz time">
              <div class="icon icon--past" aria-hidden="true"></div>
              <div class="label">Quiz time</div>
            </a>
            <a
              class="step step-link active"
              href="#"
              data-fin-reset
              title="Fin"
            >
              <div class="icon icon--current" aria-hidden="true"></div>
              <div class="label">Fin</div>
            </a>
          </div>
        </nav>

        <section class="final-scenes" aria-live="polite">
          <div id="final-backdrop" class="final-backdrop" style="background: #e6e4de"></div>
          <div id="final-table-bg" class="final-table-bg" style="background: #a38b69"></div>

          <h1 class="playfair final-copy">
            See how easy it is to control the home environment for me?
            <br />
            Rest Assured, you are ready for taking the figurine
            <br />
            to your office/classroom for remote use!
          </h1>
          <div class="final-figurine">
            <img class="img img-contain" alt="Figurine" src="../assets/figurine.png" />
          </div>
        </section>

        <script>
          (() => {
            const backdrop = document.getElementById("final-backdrop");
            const tableBg = document.getElementById("final-table-bg");
            const finReset = document.querySelector("[data-fin-reset]");
            const stage = document.querySelector(".stage");
            if (!backdrop || !tableBg || !finReset || !stage) return;

            const palettes = [
              { bg: "#e6e4de", table: "#a38b69" },
              { bg: "#e5feff", table: "#419342" },
              { bg: "#c4cecb", table: "#a38b69" },
            ];

            let idx = 0;
            let timer = null;
            const SCENE_HOLD_MS = 2000;
            const EXIT_DELAY_MS = 130;

            function render() {
              const palette = palettes[idx] || palettes[0];
              backdrop.style.backgroundColor = palette.bg;
              tableBg.style.backgroundColor = palette.table;
            }

            function clearTimer() {
              if (timer != null) {
                window.clearTimeout(timer);
                timer = null;
              }
            }

            function goToLastProgressPage() {
              stage.classList.add("is-leaving");
              window.setTimeout(() => {
                window.location.href = "./1019-2235.html";
              }, EXIT_DELAY_MS);
            }

            function runAutoFlow() {
              clearTimer();
              timer = window.setTimeout(() => {
                if (idx < palettes.length - 1) {
                  idx += 1;
                  render();
                  runAutoFlow();
                  return;
                }
                goToLastProgressPage();
              }, SCENE_HOLD_MS);
            }

            function goStartOfPage() {
              idx = 0;
              render();
              runAutoFlow();
            }

            finReset.addEventListener("click", (e) => {
              e.preventDefault();
              goStartOfPage();
            });

            runAutoFlow();
          })();
        </script>
      </main>
    </div>
  </body>
</html>
